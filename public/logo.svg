<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" width="100%" height="100%">
  <defs>
    <!-- Left C Gradient: Purple to Blue -->
    <linearGradient id="left-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>

    <!-- Star Gradient: Vibrant Royal Blue to Sky Blue -->
    <linearGradient id="star-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>

    <!-- Right C Gradient: Sky Blue to Bright Cyan -->
    <linearGradient id="right-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#00F2FE" />
    </linearGradient>
  </defs>

  <!-- Left C Shape -->
  <path d="M 370,180 A 150,150 0 1,0 370,420" 
        stroke="url(#left-grad)" 
        stroke-width="75" 
        stroke-linecap="round" 
        fill="none" />

  <!-- Right C Shape -->
  <path d="M 630,420 A 150,150 0 1,0 630,180" 
        stroke="url(#right-grad)" 
        stroke-width="75" 
        stroke-linecap="round" 
        fill="none" />

  <!-- Center Four-Pointed Star -->
  <path d="M 500,90 Q 500,300 270,300 Q 500,300 500,510 Q 500,300 730,300 Q 500,300 500,90" 
        stroke="url(#star-grad)" 
        stroke-width="75" 
        stroke-linecap="round" 
        stroke-linejoin="round" 
        fill="none" />
</svg>
